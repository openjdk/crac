name: 'Setup CRIU '
description: 'Download and install CRIU to JDK'
inputs:
  jdk-path:
    description: 'Path to JDK root'
    required: true

runs:
  using: composite
  steps:
    - name: Restore CRIU from cache
      id: criu_cache
      uses: actions/cache@v3
      with:
        path: /usr/sbin/criu
        key: criu-${{ runner.os }}

    - name: Install CRIU
      run: |
        export DEBIAN_FRONTEND=noninteractive
        sudo apt-get update
        sudo apt-get install --no-install-recommends -y software-properties-common
        sudo add-apt-repository -y ppa:criu/ppa
        sudo apt-get update
        sudo apt-get install -y criu
      shell: bash
      if: steps.criu_cache.outputs.cache-hit != 'true'

    - name: Set SUID bit on CRIU
      run: |
        sudo chmod u+s /usr/sbin/criu
      shell: bash
